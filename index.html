<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning OS</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #111;
  color: white;
}
input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>Morning Planner</h1>

<label>Leave Time:</label>
<input type="time" id="leave">

<label>Lara Wake Time:</label>
<input type="time" id="lara">

<button onclick="generate()">Generate Plan</button>

<div id="output" style="margin-top:20px;"></div>

<script>

function generate() {

  const leave = document.getElementById("leave").value;
  const lara = document.getElementById("lara").value;

  if (!leave || !lara) {
    alert("Enter all times");
    return;
  }

  function toMinutes(t) {
    const [h,m] = t.split(":").map(Number);
    return h*60 + m;
  }

  function toTime(m) {
    return String(Math.floor(m/60)).padStart(2,'0') + ":" + String(m%60).padStart(2,'0');
  }

  const leaveMin = toMinutes(leave);
  const laraMin = toMinutes(lara);

  const totalBefore = 28; // rough time needed before Lara

  let wake = laraMin - totalBefore;
  let current = wake;

  let schedule = [];

  schedule.push(toTime(current) + " Wake up");

  current += 5;
  schedule.push(toTime(current) + " Coffee + feed cats");

  current += 3;
  schedule.push(toTime(current) + " Clean bowls");

  current += 20;
  schedule.push(toTime(current) + " Bathroom");

  schedule.push("\n" + toTime(laraMin) + " Lara wakes");

  current = laraMin;

  schedule.push(toTime(current) + " Kitchen tidy");

  current += 10;
  schedule.push(toTime(current) + " Living room tidy");

  schedule.push("\n" + toTime(leaveMin) + " Leave house");

  document.getElementById("output").innerHTML =
    "<pre>" + schedule.join("\n") + "</pre>";
}

</script>

</body>
</html>
