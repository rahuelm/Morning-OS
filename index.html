<script>

function generate() {

  const leave = document.getElementById("leave").value;
  const lara = document.getElementById("lara").value;

  if (!leave || !lara) {
    alert("Please enter all times");
    return;
  }

  function toMinutes(time) {
    const [h,m] = time.split(":").map(Number);
    return h*60 + m;
  }

  function toTime(mins) {
    let h = Math.floor(mins/60);
    let m = mins % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  }

  const leaveMin = toMinutes(leave);
  const laraMin = toMinutes(lara);

  // ⏱ YOUR TASK TIMES (from your spreadsheet)
  const coffee = 5;
  const feedCats = 1;
  const cleanBowls = 2;
  const bathroomCore = 20; // realistic minimum block

  const preLaraTotal = coffee + feedCats + cleanBowls + bathroomCore;

  // 🧠 Calculate wake time
  const wakeTime = laraMin - preLaraTotal;

  let schedule = [];

  let current = wakeTime;

  // BEFORE LARA
  schedule.push(`${toTime(current)} → Wake up`);
  
  current += 2;
  schedule.push(`${toTime(current)} → Make coffee + feed cats`);
  
  current += 6;
  schedule.push(`${toTime(current)} → Clean bowls`);
  
  current += cleanBowls;
  schedule.push(`${toTime(current)} → Bathroom routine`);
  
  current += bathroomCore;
  schedule.push(`${toTime(current)} → Finish before Lara wakes`);

  // LARA WAKE POINT
  schedule.push(`\n${toTime(laraMin)} → Lara wakes`);

  current = laraMin;

  // AFTER LARA (free mode)
  schedule.push(`${toTime(current)} → Kitchen tasks (washing up etc)`);

  current += 10;
  schedule.push(`${toTime(current)} → Living room tidy + litter`);

  current += 6;
  schedule.push(`${toTime(current)} → Bed + curtains`);

  current += 3;

  // FINAL BUFFER
  if (current < leaveMin) {
    schedule.push(`${toTime(current)} → Free time / extra tidy`);
  }

  schedule.push(`\n${toTime(leaveMin)} → Leave house`);

  // OUTPUT
  document.getElementById("output").innerHTML =
    "<h2>🧠 Your Morning Plan</h2><pre>" + schedule.join("\n") + "</pre>";
}

</script>
