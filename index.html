<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning OS</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #111;
  color: white;
}
input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
pre {
  white-space: pre-wrap;
}
</style>
</head>

<body>

<h1>🌅 Morning Planner</h1>

<label>Leave Time:</label>
<input type="time" id="leave">

<label>Lara Wake Time:</label>
<input type="time" id="lara">

<button onclick="generate()">Generate Plan</button>

<div id="output" style="margin-top:20px;"></div>

<script>
function generate() {

  const leave = document.getElementById("leave").value;
  const lara = document.getElementById("lara").value;

  if (!leave || !lara) {
    alert("Please enter both times");
    return;
  }

  function toMin(t) {
    const parts = t.split(":");
    return Number(parts[0]) * 60 + Number(parts[1]);
  }

  function toTime(m) {
    const h = Math.floor(m / 60);
    const min = m % 60;
    return (h < 10 ? "0" : "") + h + ":" + (min < 10 ? "0" : "") + min;
  }

  const leaveMin = toMin(leave);
  const laraMin = toMin(lara);

  // TASK TIMES
  const wakeBlock = 13;
  const bathroom = 39;
  const kitchenExtra = 14;
  const house = 6;
  const living = 6;

  const requiredBeforeLara = wakeBlock + bathroom;

  const wakeTime = laraMin - requiredBeforeLara;

  let current = wakeTime;
  let schedule = [];

  schedule.push(toTime(current) + " → Wake up");

  // Wake block
  schedule.push(toTime(current += 2) + " → Morning wee");
  schedule.push(toTime(current += 2) + " → Make coffee");
  schedule.push(toTime(current += 5) + " → Coffee + feed cats + bowls + bag");

  const timeBeforeLara = laraMin - current;

  if (timeBeforeLara >= (bathroom + kitchenExtra)) {
    schedule.push("→ Do EXTRA kitchen tasks first");
    schedule.push(toTime(current) + " → Kitchen extras");
    current += kitchenExtra;
  } else {
    schedule.push("→ Go straight to bathroom");
  }

  schedule.push(toTime(current) + " → Bathroom routine");
  current += bathroom;

  schedule.push(toTime(current) + " → Done before Lara");

  schedule.push("");
  schedule.push(toTime(laraMin) + " → Lara wakes");

  current = Math.max(current, laraMin);

  if (timeBeforeLara < (bathroom + kitchenExtra)) {
    schedule.push(toTime(current) + " → Kitchen extras");
    current += kitchenExtra;
  }

  schedule.push(toTime(current) + " → House tasks");
  current += house;

  schedule.push(toTime(current) + " → Living room");
  current += living;

  if (current < leaveMin) {
    schedule.push(toTime(current) + " → Free time");
  }

  schedule.push("");
  schedule.push(toTime(leaveMin) + " → Leave house");

  document.getElementById("output").innerHTML =
    "<pre>" + schedule.join("\n") + "</pre>";
}
</script>

</body>
</html>
