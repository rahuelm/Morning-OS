<script>

function generate() {

  const leave = document.getElementById("leave").value;
  const lara = document.getElementById("lara").value;

  if (!leave || !lara) {
    alert("Enter all times");
    return;
  }

  function toMin(t){
    const [h,m] = t.split(":").map(Number);
    return h*60+m;
  }

  function toTime(m){
    return String(Math.floor(m/60)).padStart(2,'0') + ":" + String(m%60).padStart(2,'0');
  }

  const leaveMin = toMin(leave);
  const laraMin = toMin(lara);

  // ⏱ BLOCK TIMES
  const wakeBlock = 13;
  const bathroom = 39;
  const kitchenExtra = 14;
  const house = 6;
  const living = 6;

  const requiredBeforeLara = wakeBlock + bathroom;

  let schedule = [];

  // 🧠 Calculate wake time
  const wakeTime = laraMin - requiredBeforeLara;

  let current = wakeTime;

  schedule.push(`${toTime(current)} → Wake up`);

  // 🔵 Wake block
  current += 2;
  schedule.push(`${toTime(current)} → Morning wee`);

  current += 2;
  schedule.push(`${toTime(current)} → Make coffee`);

  current += 5;
  schedule.push(`${toTime(current)} → Drink coffee + feed cats + clean bowls + prep bag`);

  // DECISION POINT
  const timeBeforeLara = laraMin - current;

  // 🧠 LOGIC: can we fit extra kitchen BEFORE bathroom?
  if (timeBeforeLara >= (bathroom + kitchenExtra)) {

    schedule.push(`\n🧠 Enough time → do EXTRA KITCHEN FIRST`);

    schedule.push(`${toTime(current)} → Extra kitchen tasks`);
    current += kitchenExtra;

  } else {
    schedule.push(`\n⚠️ Go straight to bathroom (Lara timing constraint)`);
  }

  // 🟣 Bathroom block
  schedule.push(`${toTime(current)} → Bathroom routine`);
  current += bathroom;

  schedule.push(`${toTime(current)} → Finished before Lara`);

  // LARA WAKE
  schedule.push(`\n${toTime(laraMin)} → Lara wakes`);

  current = Math.max(current, laraMin);

  // AFTER LARA → do remaining tasks
  if (timeBeforeLara < (bathroom + kitchenExtra)) {
    schedule.push(`${toTime(current)} → Extra kitchen tasks`);
    current += kitchenExtra;
  }

  // House + living
  schedule.push(`${toTime(current)} → House tasks`);
  current += house;

  schedule.push(`${toTime(current)} → Living room tasks`);
  current += living;

  // BUFFER
  if (current < leaveMin) {
    schedule.push(`${toTime(current)} → Free time / chill`);
  }

  schedule.push(`\n${toTime(leaveMin)} → Leave house`);

  // OUTPUT
  document.getElementById("output").innerHTML =
    "<h2>🧠 Your Optimised Morning</h2><pre>" + schedule.join("\n") + "</pre>";
}

</script>
